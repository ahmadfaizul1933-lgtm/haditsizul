<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makna Pemimpin yang Sebenarnya - E-Book & Review</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f6f9;
            overflow: hidden;
        }
        header {
            background-color: #0d2c54;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .nav-btn {
            background: #1a446c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.3s;
        }
        .nav-btn:hover {
            background: #235c91;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-select {
            background-color: #00a896;
            color: white;
            padding: 10px 15px;
            font-size: 0.95rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        .dropdown-select:hover {
            background-color: #02c39a;
        }
        optgroup {
            background-color: #fff;
            color: #0d2c54;
            font-weight: bold;
        }
        option {
            color: #333;
        }
        .iframe-container {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* ========================================================= */
        /* DESAIN SAMPUL KERAJAAN MURNI HTML & CSS (REALISTIK & 3D)  */
        /* ========================================================= */
        #home-cover {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 20px;
            perspective: 2500px;
        }

        .book-presentation {
            width: 100%;
            height: 100%;
            max-height: 82vh;
            aspect-ratio: 1 / 1.45;
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.4), 
                -10px 20px 40px rgba(0,0,0,0.6), 
                -25px 40px 70px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transform: rotateY(-6deg) rotateX(2deg) rotateZ(-1deg);
            transition: transform 0.5s ease;
        }

        .book-presentation:hover {
            transform: rotateY(-2deg) rotateX(1deg) rotateZ(0deg);
        }

        .royal-book {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #061325 0%, #0b2343 40%, #123766 100%);
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .royal-book::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(212, 175, 55, 0.15) 1px, transparent 0);
            background-size: 16px 16px;
            opacity: 0.3;
            pointer-events: none;
        }

        .book-border-outer {
            border: 4px solid #d4af37;
            height: 100%;
            width: 100%;
            padding: 6px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .book-border-inner {
            border: 1px solid #d4af37;
            height: 100%;
            width: 100%;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 44, 84, 0.2);
        }

        .corner-decor {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #d4af37;
            z-index: 3;
        }
        .top-left { top: 2px; left: 2px; border-right: none; border-bottom: none; }
        .top-right { top: 2px; right: 2px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 2px; left: 2px; border-right: none; border-top: none; }
        .bottom-right { bottom: 2px; right: 2px; border-left: none; border-top: none; }

        .cover-header {
            text-align: center;
        }

        .royal-badge {
            font-size: 3.5rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6), 2px 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }

        .main-title-container {
            margin-top: 10px;
        }

        .book-title {
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #ffffff;
            font-size: 2.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            line-height: 1.2;
            text-align: center;
            text-shadow: 
                0 1px 0 #ccc, 
                0 2px 0 #c5c5c5, 
                0 3px 0 #b9b9b9, 
                0 4px 0 #aaa, 
                0 5px 10px rgba(0,0,0,0.8),
                0 0 20px rgba(212,175,55,0.3);
        }

        .title-accent {
            display: block;
            font-size: 1.4rem;
            color: #ffd700;
            font-weight: 500;
            margin-top: 12px;
            letter-spacing: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .royal-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            margin: 25px 0;
        }
        .line {
            height: 2px;
            flex: 1;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
        }
        .diamond {
            color: #ffd700;
            margin: 0 10px;
            font-size: 0.8rem;
        }

        .book-description {
            font-family: 'Georgia', serif;
            color: #e0e6ed;
            font-size: 1.05rem;
            font-style: italic;
            text-align: center;
            line-height: 1.6;
            max-width: 90%;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .cover-footer {
            text-align: center;
            width: 100%;
        }

        .meta-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a0aec0;
            margin-bottom: 12px;
        }

        .author-prefix {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffd700;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        /* Disesuaikan ukurannya agar pas dengan nama yang lebih panjang */
        .book-author {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            line-height: 1.3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255,215,0,0.3);
        }

        .book-glare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 40%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            z-index: 5;
        }

        .book-spine-shadow {
            position: absolute;
            top: 0; left: 0; width: 18px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
            z-index: 4;
        }
        /* ========================================================= */

        iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        function navigateTo(url) {
            const cover = document.getElementById('home-cover');
            const iframe = document.getElementById('content-frame');
            
            if(url === 'home') {
                cover.style.display = 'flex';
                iframe.style.display = 'none';
                iframe.src = ''; 
                document.querySelector('.dropdown-select').selectedIndex = 0;
            } else if (url) {
                cover.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }
    </script>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Makna Pemimpin yang Sebenarnya</h1>
        </div>
        <nav>
            <a href="#" class="nav-btn" onclick="navigateTo('home')">Halaman Depan</a>
            
            <div class="dropdown">
                <select class="dropdown-select" onchange="navigateTo(this.value)">
                    <option value="" disabled selected>Pilih Isi Dokumen...</option>
                    
                    <optgroup label="Buku: Makna Pemimpin">
                        <option value="kata_pengantar.html">Kata Pengantar</option>
                        <option value="pendahuluan.html">Pendahuluan</option>
                        <option value="tugas_pemimpin.html">A. Tugas Seorang Pemimpin</option>
                        <option value="kriteria_pemimpin.html">B. Kriteria Pemimpin</option>
                        <option value="sikap_rakyat.html">C. Sikap Rakyat Kepada Pemimpin</option>
                        <option value="daftar_pustaka.html">Daftar Pustaka</option>
                        <option value="profil.html">Profil Penulis</option>
                    </optgroup>

                    <optgroup label="Review Website">
                        <option value="review_website_1.html">1. Review Apk Ensiklopedi Hadis</option>
                        <option value="review_website_2.html">2. Review Apk Hadis Soft</option>
                        <option value="review_website_3.html">3. Review Website Arina.id</option>
                        <option value="review_website_4.html">4. Review Website hadis.id</option>
                        <option value="review_website_5.html">5. Review Website Al-Marji Basuki</option>
                    </optgroup>
                    
                </select>
            </div>
        </nav>
    </header>

    <div class="iframe-container">
        <div id="home-cover">
            <div class="book-presentation">
                <div class="royal-book">
                    <div class="book-glare"></div>
                    <div class="book-spine-shadow"></div>
                    
                    <div class="book-border-outer">
                        <div class="corner-decor top-left"></div>
                        <div class="corner-decor top-right"></div>
                        <div class="corner-decor bottom-left"></div>
                        <div class="corner-decor bottom-right"></div>
                        
                        <div class="book-border-inner">
                            
                            <div class="cover-header">
                                <div class="royal-badge">⚜</div>
                                <div class="main-title-container">
                                    <h2 class="book-title">MAKNA PEMIMPIN</h2>
                                    <span class="title-accent">YANG SEBENARNYA</span>
                                </div>
                            </div>
                            
                            <div class="royal-divider">
                                <div class="line"></div>
                                <div class="diamond">◆</div>
                                <div class="line"></div>
                            </div>
                            
                            <p class="book-description">
                                Kajian Komprehensif Berdasarkan Sanad & Matan Hadis Mengenai Tugas Utama, Kriteria Mutlak, serta Sikap Loyalitas Rakyat.
                            </p>
                            
                            <div class="cover-footer">
                                <div class="meta-tag">Karya E-Book & Review</div>
                                <div class="author-prefix">Disusun Oleh:</div>
                                <div class="book-author">Ahmad Faizul Mahbubillah</div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <iframe id="content-frame" src=""></iframe>
    </div>

</body>
</html>
